<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaskMaster Pro</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
</head>

<body>

<div class="background-glow"></div>

<div id="authContainer" class="auth-container">

    <div class="logo-section">
        <h1>.  TaskMaster Pro</h1>
        <p>Smart Task Management System</p>
    </div>

    <div class="auth-card">

        <div class="tabs">
            <button class="tab active" onclick="showLogin()">Login</button>
            <button class="tab" onclick="showRegister()">Register</button>
        </div>

        <div id="loginForm">

            <input type="text" id="loginUsername" placeholder="Username">

            <input type="password" id="loginPassword" placeholder="Password">

            <button class="primary-btn" onclick="login()">
                Login
            </button>

        </div>

        <div id="registerForm" style="display:none;">

            <input type="text" id="regUsername" placeholder="Username">

            <input type="email" id="regEmail" placeholder="Email">

            <input type="password" id="regPassword" placeholder="Password">

            <button class="primary-btn" onclick="register()">
                Create Account
            </button>

        </div>

    </div>

</div>

<div id="dashboard" style="display:none;">

<header>

<h1>TaskMaster Pro</h1>

<button class="logout-btn" onclick="logout()">
Logout
</button>

</header>

<section class="stats">

<div class="stats">

    <div class="stat-card">
        <div class="stat-icon total">
            <i class="fas fa-list-check"></i>
        </div>
        <h3>Total Tasks</h3>
        <p id="totalTasks">0</p>
    </div>

    <div class="stat-card">
        <div class="stat-icon completed">
            <i class="fas fa-check"></i>
        </div>
        <h3>Completed</h3>
        <p id="completedTasks">0</p>
    </div>

    <div class="stat-card">
        <div class="stat-icon pending">
            <i class="fas fa-clock"></i>
        </div>
        <h3>Pending</h3>
        <p id="pendingTasks">0</p>
    </div>

</div>

</section>

<section class="task-form">

<h2>Create New Task</h2>

<input
type="text"
id="taskTitle"
placeholder="Task Title">

<textarea
id="taskDescription"
placeholder="Task Description"></textarea>

<div class="deadline-wrapper">
    <span id="deadlinePlaceholder" class="deadline-placeholder">
        Deadline *
    </span>

    <input
    type="datetime-local"
    id="taskDeadline"
    oninput="hideDeadlinePlaceholder()">
</div>￼

<button class="primary-btn" onclick="addTask()">
Create Task
</button>

</section>

<section class="task-list-section">

<h2>My Tasks</h2>

<div id="taskList"></div>

</section>

</div>

<script src="app.js"></script>
<footer class="footer">
    <p>Developed by Mariepascal</p>
    <p>© 2026 TaskMaster Pro | Software Construction Project</p>
</footer>

</body>
</html>
